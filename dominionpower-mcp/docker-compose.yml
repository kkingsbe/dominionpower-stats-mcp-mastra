services:
  dominion-mcp:
    build: .
    ports:
      - "${PORT:-3456}:${PORT:-3456}"
      - "${ADMIN_PORT:-8080}:${ADMIN_PORT:-8080}"
    volumes:
      - ./data:/data
    env_file: .env
    environment:
      - PORT=${PORT:-3456}
      - ADMIN_PORT=${ADMIN_PORT:-8080}
      - HOST=0.0.0.0
      - DATA_DIR=/data
      - LOG_LEVEL=${LOG_LEVEL:-info}
    restart: unless-stopped
